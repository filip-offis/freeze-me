services:
  backend:
    build:
      context: ./backend
      args:
        SAM_VERSION: ${SAM_VERSION:-small}
    environment:
      SAM_VERSION: ${SAM_VERSION:-small}
    volumes:
      - freeze-me-videos:/app/src/videos
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/}
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  freeze-me-videos:
