server {
    listen 80;

    # Serve static frontend files
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ @backend;
    }

    # SPA fallback: serve index.html for client-side routes
    location @backend {
        # If the request looks like a frontend route (no file extension),
        # try index.html first; otherwise proxy to the backend API.
        root /usr/share/nginx/html;
        try_files /index.html @api;
    }

    location @api {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Support large video uploads
        client_max_body_size 500M;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Explicitly proxy known API endpoints to the backend
    location ~ ^/(upload-video|get-video|cut-video|video-details|total-frame-count|get-frame|set-background-type|initialize-segmentation|add-point|get-segmentation-result|upload-background|get-background-type|select-background|effect|apply-final-effects|final-effects-preview|video-ids|project-data|delete-video|get-motion-blur-preview) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 500M;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
